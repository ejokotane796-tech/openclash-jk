# ========================
# OpenClash 优化配置文件
# ========================
# 项目地址: https://github.com/jackcsq/openclash-config
# 更新时间: 2025-06-20
# 适用版本: OpenClash v0.45.x+

# ========================
# 机场节点订阅配置
# ========================
proxy-providers:
  魔戒机场:
    url: https://msub.xn--m7r52rosihxm.com/api/v1/client/subscribe?token=6399bc02bc089c9df2863821fe28fc59
    type: http
    interval: 86400
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300
    proxy: 直连

  牛逼机场:
    url: https://zhuzhuzhu.whtjdasha.com/api/v1/client/subscribe?token=81d0e41d845febccf6f4eaa212bf7bcf
    type: http
    interval: 86400
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300
    proxy: 直连


  POL机场:
    url: https://ang-88feishuhuosanwxna.polyhongmeng.com/s/27e5eaf9c7b4253880aa9880cda2d514
    type: http
    interval: 86400
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300
    proxy: 直连


# ========================
# 内置代理节点
# ========================
proxies:
  - {name: 直连, type: direct}
  - {name: 拒绝, type: reject}

# ========================
# 网络端口配置
# ========================
port: 7890              # HTTP 代理端口
socks-port: 7891        # SOCKS5 代理端口
redir-port: 7892        # 重定向端口
mixed-port: 7893        # 混合代理端口
tproxy-port: 7895       # TProxy 端口

allow-lan: true         # 允许局域网连接
mode: rule              # 运行模式: rule/global/direct
log-level: info         # 日志级别: silent/error/warning/info/debug

# ========================
# Web UI 管理界面
# ========================
external-controller: 0.0.0.0:9090
external-ui: ui
external-ui-name: zashboard
external-ui-url: "https://github.moeyy.xyz/https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"
secret: "123456"        # ⚠️ 请修改为安全密码

# ========================
# DNS 配置
# ========================
dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.20.0.1/16
  nameserver:
    - 223.5.5.5           # 阿里云 DNS
  fake-ip-filter:
    - +.lan
    - +.local
    - geosite:cn
    # 自定义过滤域名
    - +.mitce.net
    - +.ddns-link-b5.uk
    - +.dexlos.com

ipv6: true              # 启用 IPv6 支持

# ========================
# TUN 模式配置
# ========================
tun:
  enable: true
  stack: gvisor           # 网络栈: system/gvisor/lwip
  device: utun
  endpoint-independent-nat: true
  auto-route: false
  auto-detect-interface: false
  auto-redirect: false
  strict-route: false

# ========================
# 配置文件设置
# ========================
profile:
  store-selected: true    # 存储策略组选择
  store-fake-ip: true     # 存储 fake-ip

# ========================
# 策略组模板定义
# ========================
default: &default
  type: select
  proxies:
    - 直连
    - 所有-手动
    - 所有-自动
    - 住宅-故转
    - 香港-故转
    - 香港-自动
    - 台湾-故转
    - 日本-故转
    - 日本-自动
    - 新加坡-故转
    - 新加坡AI-自动
    - 韩国-故转
    - 美国-故转
    - 英国-故转
    - 其他-故转
    - 拒绝

# ========================
# 策略组配置
# ========================
proxy-groups:

  # AI 服务策略组
  - name: ChatGPT
    <<: *default
  
  - name: Claude
    <<: *default
  
  - name: Meta AI
    <<: *default
  
  - name: Perplexity
    <<: *default
  
  - name: Gemini
    <<: *default

  # 社交媒体策略组
  - name: Telegram
    <<: *default
  
  - name: Twitter(X)
    <<: *default
  
  - name: WhatsApp
    <<: *default
  
  - name: Facebook
    <<: *default
  
  # 流媒体策略组
  - name: YouTube
    <<: *default
  
  - name: Netflix
    <<: *default
  
  - name: TikTok
    <<: *default
  
  - name: Disney
    <<: *default
  
  - name: HBO
    <<: *default
  
  - name: Spotify
    <<: *default
  
  # 游戏策略组
  - name: Steam
    <<: *default
  
  - name: Game
    <<: *default
  
  # 科技公司策略组
  - name: Google
    <<: *default
  
  - name: Apple
    <<: *default
  
  - name: Microsoft
    <<: *default
  
  - name: Amazon
    <<: *default
  
  - name: GitHub
    <<: *default
  
  # 加密货币策略组
  - name: Crypto
    <<: *default
  
  # 功能性策略组
  - name: Test
    <<: *default
  
  - name: Block
    type: select
    proxies:
      - 拒绝
      - 直连

  # 主要策略组
  - name: 国外
    <<: *default
  
  - name: 国内
    type: select
    proxies:
      - 直连
      - 国外
  
  - name: 其他
    <<: *default

  # 节点选择策略组
  - name: 所有-手动
    type: select
    use:
      - 魔戒机场
      - 牛逼机场
      - POL机场
  
  - name: 所有-自动
    type: url-test
    use:
      - 魔戒机场
      - 牛逼机场
      - POL机场
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50
  
  # 地区分组策略组
  - name: 住宅-故转
    type: fallback
    use:
      - 魔戒机场
      - 牛逼机场
      - POL机场
    filter: "(?i)住宅"
    url: "https://www.gstatic.com/generate_204"
    interval: 300

  - name: 香港-故转
    type: fallback
    use:
      - 魔戒机场
      - 牛逼机场
      - POL机场
    filter: "(?i)港|hk|hongkong|hong kong"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
  
  - name: 香港-自动
    type: url-test
    use:
      - 魔戒机场
      - 牛逼机场
      - POL机场
    filter: "(?i)港|hk|hongkong|hong kong"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50

  - name: 台湾-故转
    type: fallback
    use:
      - 魔戒机场
      - 牛逼机场
      - POL机场
    filter: "(?i)台|tw|taiwan"
    url: "https://www.gstatic.com/generate_204"
    interval: 300

  
  - name: 日本-故转
    type: fallback
    use:
      - 魔戒机场
      - 牛逼机场
      - POL机场
    filter: "(?i)日本|jp|japan"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
  
  - name: 日本-自动
    type: url-test
    use:
      - 魔戒机场
      - 牛逼机场
      - POL机场
    filter: "(?i)日本|jp|japan"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50

  - name: 新加坡-故转
    type: fallback
    use:
      - 魔戒机场
      - 牛逼机场
      - POL机场
    filter: "(?i)新加坡|sg|singapore"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
  
  - name: 新加坡AI-自动
    type: url-test
    use:
      - 魔戒机场
      - 牛逼机场
      - POL机场
    filter: "(?i)^(?=.*新加坡)(?=.*Gemini)"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50

  - name: 韩国-故转
    type: fallback
    use:
      - 魔戒机场
      - 牛逼机场
      - POL机场
    filter: "(?i)韩|kr|korea"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
  
  - name: 美国-故转
    type: fallback
    use:
      - 魔戒机场
      - 牛逼机场
      - POL机场
    filter: "(?i)美|us|unitedstates|united states"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
  
  - name: 英国-故转
    type: fallback
    use:
      - 魔戒机场
      - 牛逼机场
      - POL机场
    filter: "(?i)英|uk|britain|unitedkingdom|united kingdom"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
  
  - name: 其他-故转
    type: fallback
    use:
      - 魔戒机场
      - 牛逼机场
      - POL机场
    filter: "^(?!.*(港|hk|hongkong|hong kong|台|tw|taiwan|日本|jp|japan|新加坡|sg|singapore|韩|kr|korea|美|us|unitedstates|united states|英|uk|britain|unitedkingdom|united kingdom)).*$"
    url: "https://www.gstatic.com/generate_204"
    interval: 300


  

# ========================
# 路由规则配置
# ========================
rules:
  # 测试和拦截规则
  - RULE-SET,TEST / Domain,Test
  - RULE-SET,Block / Domain,Block
  
  # AI 服务路由
  - RULE-SET,ChatGPT / Domain,ChatGPT
  - RULE-SET,Claude / Domain,Claude
  - RULE-SET,Meta AI / Domain,Meta AI
  - RULE-SET,Perplexity / Domain,Perplexity
  
  # 开发工具路由
  - RULE-SET,GitHub / Domain,GitHub
  
  # 社交媒体路由
  - RULE-SET,Telegram / Domain,Telegram
  - RULE-SET,Telegram / IP,Telegram,no-resolve
  - RULE-SET,Twitter / Domain,Twitter(X)
  - RULE-SET,WhatsApp / Domain,WhatsApp
  - RULE-SET,Facebook / Domain,Facebook
  
  # 科技公司路由
  - RULE-SET,Amazon / Domain,Amazon
  - RULE-SET,Apple / Domain,Apple
  - RULE-SET,Apple-CN / Domain,Apple
  - RULE-SET,Microsoft / Domain,Microsoft
  
  # 加密货币路由
  - RULE-SET,OKX / Domain,Crypto
  - RULE-SET,Bybit / Domain,Crypto
  - RULE-SET,Binance / Domain,Crypto
  
  # 流媒体路由
  - RULE-SET,Youtube / Domain,YouTube
  - RULE-SET,TikTok / Domain,TikTok
  - RULE-SET,Netflix / Domain,Netflix
  - RULE-SET,Netflix / IP,Netflix,no-resolve
  - RULE-SET,Disney / Domain,Disney
  - RULE-SET,HBO / Domain,HBO
  - RULE-SET,Spotify / Domain,Spotify
  
  # 游戏平台路由
  - RULE-SET,Steam / Domain,Steam
  - RULE-SET,Epic / Domain,Game
  - RULE-SET,EA / Domain,Game
  - RULE-SET,Blizzard / Domain,Game
  - RULE-SET,UBI / Domain,Game
  - RULE-SET,PlayStation / Domain,Game
  - RULE-SET,Nintend / Domain,Game
  
  # Google 服务路由
  - RULE-SET,Google / Domain,Google
  - RULE-SET,Google / IP,Google,no-resolve
  
  # 国外网站路由
  - RULE-SET,Proxy / Domain,国外
  - RULE-SET,Globe / Domain,国外
  
  # 国内网站路由
  - RULE-SET,Direct / Domain,国内
  - RULE-SET,China / Domain,国内
  - RULE-SET,China / IP,国内,no-resolve
  - RULE-SET,Private / Domain,国内
  
  # 默认规则
  - MATCH,其他

